name: GovPlot Scraper — Auto Run

on:
  schedule:
    # Daily at 6:30 AM IST (1:00 UTC) — refresh OPEN/ACTIVE scheme status only
    - cron: "0 1 * * 1-6"
    # Weekly full pull every Sunday at 6:30 AM IST (1:00 UTC) — all cities
    - cron: "0 1 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraper mode: auto | full | refresh | verify"
        required: false
        default: "auto"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome (for Selenium scrapers)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser chromium-chromedriver
          echo "CHROME_BIN=/usr/bin/chromium-browser" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=/usr/bin/chromedriver" >> $GITHUB_ENV

      - name: Detect scraper mode
        id: mode
        run: |
          # Manual dispatch overrides automatic detection
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          # Sunday = weekly full pull
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=refresh" >> $GITHUB_OUTPUT
          fi

      - name: Run scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOVPLOT_FORCE_FULL: ${{ steps.mode.outputs.mode == 'full' && '1' || '0' }}
        run: |
          echo "Running in mode: ${{ steps.mode.outputs.mode }}"
          python -m scraper.main ${{ steps.mode.outputs.mode }}

      - name: Run verification (weekly only)
        if: steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'verify'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.main verify

      - name: Commit updated data files
        run: |
          git config --local user.email "bot@govplottracker.in"
          git config --local user.name "GovPlot Bot"
          git add data/schemes/latest.json data/schemes/verification_scores.json || true
          git diff --staged --quiet || git commit -m "chore: update scheme data [$(date -u +%Y-%m-%dT%H:%M:%SZ)] mode=${{ steps.mode.outputs.mode }}"
          git push || true

      - name: Summary
        if: always()
        run: |
          SCHEME_COUNT=$(python -c "import json; d=json.load(open('data/schemes/latest.json')); print(len(d))" 2>/dev/null || echo "unknown")
          echo "### 🏠 GovPlot Scraper Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${{ steps.mode.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Schemes in DB:** ${SCHEME_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
