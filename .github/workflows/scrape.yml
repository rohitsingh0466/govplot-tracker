name: GovPlot Scraper — Auto Run v3.2

# WORKFLOW v3.2:
#
#   FULL PULL (Sunday 6:30 AM IST):
#     - Runs all scrapers in scraper/registry.py (NOT all_cities.py — deleted)
#     - Live HTTP + Selenium scraping per authority
#     - Falls back to STATIC data if live fails
#     - Marks each scheme: data_source = LIVE | STATIC
#     - Upserts all schemes to Supabase (scheme_id conflict key)
#     - Sends failure summary email if any scrapers fell back to STATIC
#     - Commits latest.json to git
#
#   REFRESH (Mon-Sat 6:30 AM IST):
#     - Re-checks OPEN + UPCOMING schemes in Supabase
#     - Updates status if close_date has passed (OPEN → CLOSED etc.)
#     - No new inserts in refresh mode
#     - Commits updated latest.json to git
#
#   FILTERS (enforced in Python):
#     - Residential Plot lottery schemes ONLY
#     - No LIG / EWS / eAuction / commercial / flat schemes
#     - close_date within last 1 year OR null
#     - price_min >= ₹25L
#
# REQUIRED SECRETS:
#   SUPABASE_URL          — Supabase project URL
#   SUPABASE_SERVICE_KEY  — Supabase service role key (not anon key)
#   SENDGRID_API_KEY      — For failure alert emails
#   DATABASE_URL          — PostgreSQL URL (for schema migrations)
#
# ENVIRONMENT VARS SET IN WORKFLOW:
#   FROM_EMAIL            — sender address for alerts (alerts@govplottracker.com)

on:
  schedule:
    # Mon–Sat 6:30 AM IST (1:00 UTC) — refresh OPEN/UPCOMING statuses
    - cron: "0 1 * * 1-6"
    # Sunday 6:30 AM IST (1:00 UTC) — full pull all authorities
    - cron: "0 1 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraper mode: auto | full | refresh"
        required: false
        default: "auto"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # Live HTTP + Selenium needs more time

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chromium for Selenium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser chromium-chromedriver
          echo "CHROME_BIN=/usr/bin/chromium-browser" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=/usr/bin/chromedriver" >> $GITHUB_ENV
          chromium-browser --version

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Detect scraper mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=refresh" >> $GITHUB_OUTPUT
          fi

      # ── STEP A: Scrape → Push to Supabase → Send alert if failures ────────
      - name: Step A — Scrape, push to Supabase, alert on failures
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENDGRID_API_KEY:     ${{ secrets.SENDGRID_API_KEY }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          FROM_EMAIL:           "alerts@govplottracker.com"
          GOVPLOT_FORCE_FULL:   ${{ steps.mode.outputs.mode == 'full' && '1' || '0' }}
          CHROME_BIN:           /usr/bin/chromium-browser
          CHROMEDRIVER_PATH:    /usr/bin/chromedriver
        run: |
          echo "▶ Mode: ${{ steps.mode.outputs.mode }}"
          python -m scraper.main ${{ steps.mode.outputs.mode }}

      # ── STEP B: Commit latest.json to git ─────────────────────────────────
      - name: Step B — Commit data to git
        run: |
          git config --local user.email "bot@govplottracker.in"
          git config --local user.name  "GovPlot Bot"
          git add data/schemes/latest.json || true
          git diff --staged --quiet || git commit -m \
            "chore: scheme data [$(date -u +%Y-%m-%dT%H:%M:%SZ)] mode=${{ steps.mode.outputs.mode }}"
          git push || true

      # ── STEP C: Job summary ────────────────────────────────────────────────
      - name: Step C — Summary
        if: always()
        run: |
          python - <<'EOF'
          import json, sys
          try:
              d = json.load(open("data/schemes/latest.json"))
              total    = len(d)
              open_c   = sum(1 for s in d if s.get("status") == "OPEN")
              upcoming = sum(1 for s in d if s.get("status") == "UPCOMING")
              closed   = sum(1 for s in d if s.get("status") == "CLOSED")
              live     = sum(1 for s in d if s.get("data_source") == "LIVE")
              static   = sum(1 for s in d if s.get("data_source") == "STATIC")
              print(f"TOTAL={total} OPEN={open_c} UPCOMING={upcoming} CLOSED={closed} LIVE={live} STATIC={static}")
          except Exception as e:
              print(f"TOTAL=unknown ERROR={e}")
          EOF

          SCHEME_COUNT=$(python -c "import json; d=json.load(open('data/schemes/latest.json')); print(len(d))" 2>/dev/null || echo "unknown")
          OPEN_COUNT=$(python -c "import json; d=json.load(open('data/schemes/latest.json')); print(sum(1 for s in d if s.get('status')=='OPEN'))" 2>/dev/null || echo "unknown")
          UPCOMING_COUNT=$(python -c "import json; d=json.load(open('data/schemes/latest.json')); print(sum(1 for s in d if s.get('status')=='UPCOMING'))" 2>/dev/null || echo "unknown")
          LIVE_COUNT=$(python -c "import json; d=json.load(open('data/schemes/latest.json')); print(sum(1 for s in d if s.get('data_source')=='LIVE'))" 2>/dev/null || echo "unknown")
          STATIC_COUNT=$(python -c "import json; d=json.load(open('data/schemes/latest.json')); print(sum(1 for s in d if s.get('data_source')=='STATIC'))" 2>/dev/null || echo "unknown")

          echo "### 🏠 GovPlot Scraper v3.2 Run" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | ${{ steps.mode.outputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Schemes** | ${SCHEME_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Open** | ${OPEN_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Upcoming** | ${UPCOMING_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **🟢 LIVE scraped** | ${LIVE_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **🟡 STATIC fallback** | ${STATIC_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Filters** | Residential Plot only · No LIG/EWS/eAuction · ≥₹25L · Last 1 year |" >> $GITHUB_STEP_SUMMARY
          echo "| **Alert** | rohit0904singh@gmail.com on fallback |" >> $GITHUB_STEP_SUMMARY
