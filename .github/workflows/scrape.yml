name: GovPlot Scraper — Auto Run

# WORKFLOW DESIGN (simplified v3.0):
#
#   Step A — python -m scraper.main <mode>
#             Runs scrapers, saves JSON to data/schemes/latest.json.
#             No verification engine. No database push.
#             No external site hits beyond the authority portals.
#
#   Step B — Commit data files to repo
#             Commits latest.json with timestamp.
#
# MODES:
#   full    → Sunday: all cities, all scrapers
#   refresh → Mon–Sat: active/open schemes only
#   auto    → Detects day automatically

on:
  schedule:
    # Mon–Sat 6:30 AM IST (1:00 UTC) — refresh active schemes only
    - cron: "0 1 * * 1-6"
    # Sunday 6:30 AM IST (1:00 UTC) — full pull of all cities
    - cron: "0 1 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraper mode: auto | full | refresh"
        required: false
        default: "auto"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Detect scraper mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=refresh" >> $GITHUB_OUTPUT
          fi

      # ── STEP A: SCRAPE → SAVE ─────────────────────────────────────────────
      - name: Step A — Scrape and save to disk
        env:
          GOVPLOT_FORCE_FULL: ${{ steps.mode.outputs.mode == 'full' && '1' || '0' }}
        run: |
          echo "▶ Mode: ${{ steps.mode.outputs.mode }}"
          python -m scraper.main ${{ steps.mode.outputs.mode }}

      # ── STEP B: COMMIT DATA FILES ─────────────────────────────────────────
      - name: Step B — Commit data files
        run: |
          git config --local user.email "bot@govplottracker.in"
          git config --local user.name "GovPlot Bot"
          git add data/schemes/latest.json || true
          git diff --staged --quiet || git commit -m "chore: scheme data [$(date -u +%Y-%m-%dT%H:%M:%SZ)] mode=${{ steps.mode.outputs.mode }}"
          git push || true

      # ── STEP C: SUMMARY ───────────────────────────────────────────────────
      - name: Step C — Summary
        if: always()
        run: |
          SCHEME_COUNT=$(python -c "
          import json
          try:
              d = json.load(open('data/schemes/latest.json'))
              print(len(d))
          except:
              print('unknown')
          " 2>/dev/null || echo "unknown")
          OPEN_COUNT=$(python -c "
          import json
          try:
              d = json.load(open('data/schemes/latest.json'))
              print(len([s for s in d if s.get('status') in ('OPEN','ACTIVE')]))
          except:
              print('unknown')
          " 2>/dev/null || echo "unknown")
          echo "### 🏠 GovPlot Scraper Run" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${{ steps.mode.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Schemes:** ${SCHEME_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Open/Active:** ${OPEN_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Filters:** 2025+ only | Residential Plot only | Min ₹25L" >> $GITHUB_STEP_SUMMARY
