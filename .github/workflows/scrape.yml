name: GovPlot Scraper — Auto Run v4.0

# ─────────────────────────────────────────────────────────────────────────────
# WHAT CHANGED IN v4.0:
#
#  FIX 1: [skip ci] added to bot commit message
#    Bot data commits no longer trigger Vercel production deployments.
#    ONLY real code pushes trigger deploy — this was the blog route outage cause.
#
#  FIX 2: 20-city v4.0 scraper architecture
#    - Each city now has a dedicated scraper file
#    - 4-tier strategy: Static HTML → Playwright → Aggregators → Fallback
#    - city_config.py is the single source of truth
#
#  FIX 3: ScraperAPI proxy for .gov.in domains
#    Indian gov portals block GitHub Actions Azure runners (US region).
#    Set SCRAPER_API_KEY in GitHub Secrets → free 5000 req/month.
#    Without key: ScraperAPI bypassed, STATIC fallback used.
#
#  FIX 4: Playwright stealth mode
#    Removes navigator.webdriver fingerprint, randomizes viewport/UA.
#
#  FIX 5: Aggregators ALWAYS run
#    eauctionsindia.com, 99acres.com, awaszone.com checked for every city
#    alongside primary scraping. Marked data_source="LIVE" (aggregator).
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Sunday 1:00 UTC (6:30 AM IST) — full pull (all 20 cities)
    - cron: "0 1 * * 0"
    # Mon–Sat 1:00 UTC (6:30 AM IST) — refresh only (OPEN/UPCOMING status check)
    - cron: "0 1 * * 1-6"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraper mode: auto | full | refresh"
        required: false
        default: "full"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Google Chrome (official binary) ────────────────────────
      - name: Install Google Chrome (stable, official)
        run: |
          wget -q -O /tmp/google-signing-key.pub \
            https://dl.google.com/linux/linux_signing_key.pub
          sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg \
            /tmp/google-signing-key.pub
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable
          google-chrome --version

      # ── 4. Cache pip ─────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v40-${{ hashFiles('requirements.txt') }}

      # ── 5. Install Python deps ───────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 6. Install Playwright + bundled Chromium ─────────────────────────
      - name: Install Playwright browsers
        run: |
          pip install playwright==1.44.0
          python -m playwright install chromium
          # Ubuntu 24.04 renamed some libs — install manually
          sudo apt-get install -y -qq \
            libasound2t64 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libgbm1 libgtk-3-0t64 libnspr4 \
            libnss3 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xvfb || true
          # Smoke test
          python -c "
          from playwright.sync_api import sync_playwright
          pw = sync_playwright().start()
          b = pw.chromium.launch(headless=True)
          b.close(); pw.stop()
          print('✅ Playwright Chromium OK')
          "

      # ── 7. Detect mode ───────────────────────────────────────────────────
      - name: Detect scraper mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=refresh" >> $GITHUB_OUTPUT
          fi

      # ── 8. Run scraper ───────────────────────────────────────────────────
      - name: Run scraper → Supabase → Alert email
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENDGRID_API_KEY:     ${{ secrets.SENDGRID_API_KEY }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          SCRAPER_API_KEY:      ${{ secrets.SCRAPER_API_KEY }}
          FROM_EMAIL:           "alerts@govplottracker.com"
          GOVPLOT_FORCE_FULL:   ${{ steps.mode.outputs.mode == 'full' && '1' || '0' }}
          CHROME_BIN:           /usr/bin/google-chrome
          CHROMEDRIVER_PATH:    /usr/bin/chromedriver
        run: |
          echo "▶ Running in mode: ${{ steps.mode.outputs.mode }}"
          python -m scraper.main ${{ steps.mode.outputs.mode }}

      # ── 9. Commit data to git ─────────────────────────────────────────────
      # KEY FIX v4.0: [skip ci] prevents this bot commit from triggering
      # Vercel production deployment. This was causing blog route outages.
      - name: Commit latest scheme data
        run: |
          git config --local user.email "bot@govplottracker.in"
          git config --local user.name  "GovPlot Bot"
          git add data/schemes/latest.json || true
          git diff --staged --quiet || git commit -m \
            "chore(data): scheme data $(date -u +%Y-%m-%dT%H:%M:%SZ) mode=${{ steps.mode.outputs.mode }} [skip ci]"
          git push || true
        # NOTE: [skip ci] in commit message tells Vercel/GitHub Actions
        # NOT to trigger a new deployment from this data-only commit.
        # This is the fix for the blog route outage caused by bot commits
        # overriding the production deployment.

      # ── 10. Summary ──────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json
          try:
              d = json.load(open("data/schemes/latest.json"))
              total  = len(d)
              open_  = sum(1 for s in d if s.get("status") == "OPEN")
              up     = sum(1 for s in d if s.get("status") == "UPCOMING")
              closed = sum(1 for s in d if s.get("status") == "CLOSED")
              live   = sum(1 for s in d if s.get("data_source") == "LIVE")
              static = sum(1 for s in d if s.get("data_source") == "STATIC")
              cities = len(set(s.get("city","") for s in d))
              print(f"TOTAL={total} OPEN={open_} UPCOMING={up} CLOSED={closed} LIVE={live} STATIC={static} CITIES={cities}")
          except Exception as e:
              print(f"SUMMARY ERROR: {e}")
          PYEOF

          echo "### 🏠 GovPlot Scraper v4.0 — Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | ${{ steps.mode.outputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cities** | 20 (city_config.py) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tiers** | 1=HTML, 2=Playwright, 3=Aggregators, 4=Fallback |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bot Commit** | [skip ci] → no Vercel deploy triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **ScraperAPI** | ${{ secrets.SCRAPER_API_KEY != '' && 'configured ✅' || 'not set — using direct' }} |" >> $GITHUB_STEP_SUMMARY
