name: GovPlot Scraper — Auto Run

# WORKFLOW DESIGN (v3.1):
#
#   FULL PULL (Sunday 6:30 AM IST):
#     Step A — python -m scraper.main full
#              Runs all 58 scrapers, filters schemes, recalculates statuses.
#              Upserts ALL schemes into Supabase (INSERT new + UPDATE existing).
#              Saves latest.json to git.
#     No eAuction / LIG / EWS schemes included.
#     Scheme name format: "Authority Name + Scheme Name + Year of Launch"
#
#   REFRESH (Mon–Sat 6:30 AM IST):
#     Step A — python -m scraper.main refresh
#              Fetches only OPEN + UPCOMING schemes from Supabase.
#              Recalculates status from today's date vs open/close dates.
#              Updates changed statuses in Supabase (no new inserts).
#              Saves updated latest.json to git.
#
#   DATE WINDOW: close_date >= (today - 365 days) OR close_date is null
#   PRICE FILTER: price_min >= ₹25L
#
# REQUIRED SECRETS:
#   SUPABASE_URL          — your Supabase project URL
#   SUPABASE_SERVICE_KEY  — your Supabase service role key (not anon key)

on:
  schedule:
    # Mon–Sat 6:30 AM IST (1:00 UTC) — refresh OPEN/UPCOMING statuses only
    - cron: "0 1 * * 1-6"
    # Sunday 6:30 AM IST (1:00 UTC) — full pull of all 58 scrapers
    - cron: "0 1 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraper mode: auto | full | refresh"
        required: false
        default: "auto"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Detect scraper mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=refresh" >> $GITHUB_OUTPUT
          fi

      # ── STEP A: SCRAPE → FILTER → SUPABASE PUSH → SAVE ───────────────────
      - name: Step A — Scrape, filter, push to Supabase, save to disk
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOVPLOT_FORCE_FULL: ${{ steps.mode.outputs.mode == 'full' && '1' || '0' }}
        run: |
          echo "▶ Mode: ${{ steps.mode.outputs.mode }}"
          python -m scraper.main ${{ steps.mode.outputs.mode }}

      # ── STEP B: COMMIT DATA FILES ─────────────────────────────────────────
      - name: Step B — Commit updated latest.json to git
        run: |
          git config --local user.email "bot@govplottracker.in"
          git config --local user.name "GovPlot Bot"
          git add data/schemes/latest.json || true
          git diff --staged --quiet || git commit -m "chore: scheme data [$(date -u +%Y-%m-%dT%H:%M:%SZ)] mode=${{ steps.mode.outputs.mode }}"
          git push || true

      # ── STEP C: SUMMARY ───────────────────────────────────────────────────
      - name: Step C — Job summary
        if: always()
        run: |
          SCHEME_COUNT=$(python -c "
          import json
          try:
              d = json.load(open('data/schemes/latest.json'))
              print(len(d))
          except:
              print('unknown')
          " 2>/dev/null || echo "unknown")

          OPEN_COUNT=$(python -c "
          import json
          try:
              d = json.load(open('data/schemes/latest.json'))
              print(len([s for s in d if s.get('status') == 'OPEN']))
          except:
              print('unknown')
          " 2>/dev/null || echo "unknown")

          UPCOMING_COUNT=$(python -c "
          import json
          try:
              d = json.load(open('data/schemes/latest.json'))
              print(len([s for s in d if s.get('status') == 'UPCOMING']))
          except:
              print('unknown')
          " 2>/dev/null || echo "unknown")

          CLOSED_COUNT=$(python -c "
          import json
          try:
              d = json.load(open('data/schemes/latest.json'))
              print(len([s for s in d if s.get('status') == 'CLOSED']))
          except:
              print('unknown')
          " 2>/dev/null || echo "unknown")

          echo "### 🏠 GovPlot Scraper Run" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${{ steps.mode.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Schemes:** ${SCHEME_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Open:** ${OPEN_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Upcoming:** ${UPCOMING_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Closed:** ${CLOSED_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Filters:** Last 1 year | Residential Plot only | Min ₹25L | No eAuction/LIG/EWS" >> $GITHUB_STEP_SUMMARY
          echo "- **Supabase:** Push enabled (full=upsert, refresh=status-update only)" >> $GITHUB_STEP_SUMMARY
